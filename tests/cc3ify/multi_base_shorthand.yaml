type: charm

parts:
  charm:
    plugin: dump
    source: .
    prime:
      - hooks/*
      - metadata.yaml

bases:
  - build-on:
      - name: ubuntu
        channel: "22.04"
        architectures: [amd64]
    run-on:
      - name: ubuntu
        channel: "22.04"
        architectures: [amd64]
  - build-on:
      - name: ubuntu
        channel: "22.04"
        architectures: [s390x]
    run-on:
      - name: ubuntu
        channel: "22.04"
        architectures: [s390x]
  - build-on:
      - name: ubuntu
        channel: "22.04"
        architectures: [ppc64el]
    run-on:
      - name: ubuntu
        channel: "22.04"
        architectures: [ppc64el]
  - build-on:
      - name: ubuntu
        channel: "22.04"
        architectures: [arm64]
    run-on:
      - name: ubuntu
        channel: "22.04"
        architectures: [arm64]
  - build-on:
      - name: ubuntu
        channel: '24.04'
        architectures:
          - amd64
    run-on:
      - name: ubuntu
        channel: '24.04'
        architectures:
          - amd64
  - build-on:
      - name: ubuntu
        channel: '24.04'
        architectures:
          - s390x
    run-on:
      - name: ubuntu
        channel: '24.04'
        architectures:
          - s390x
  - build-on:
      - name: ubuntu
        channel: '24.04'
        architectures:
          - ppc64el
    run-on:
      - name: ubuntu
        channel: '24.04'
        architectures:
          - ppc64el
  - build-on:
      - name: ubuntu
        channel: '24.04'
        architectures:
          - arm64
    run-on:
      - name: ubuntu
        channel: '24.04'
        architectures:
          - arm64
