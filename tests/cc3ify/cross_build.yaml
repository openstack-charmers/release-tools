type: charm

parts:
  charm:
    plugin: dump
    source: .
    prime:
      - hooks/*
      - metadata.yaml

bases:
  - build-on:
      - name: ubuntu
        channel: "22.04"
        architectures:
          - amd64
    run-on:
      - name: ubuntu
        channel: "22.04"
        architectures: [amd64, s390x, ppc64el, arm64]
  - build-on:
      - name: ubuntu
        channel: '24.04'
        architectures:
          - amd64
    run-on:
      - name: ubuntu
        channel: '24.04'
        architectures:
          - amd64
          - s390x
          - ppc64el
          - arm64
